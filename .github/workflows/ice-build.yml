name: ICE experiment build

# Focused build for the experiment/ice-candidate-traversal branch.
# Produces just the two clients needed to test ICE-style NAT traversal across
# different networks:
#   * Windows x86_64 (Flutter, portable folder)
#   * Android arm64 (release-signed APK using the stable key in repo secrets)
# Both are uploaded as workflow artifacts (no GitHub release is created).
# Versions/pins mirror flutter-build.yml + bridge.yml so we match a stock build.

on:
  workflow_dispatch:

env:
  RUST_VERSION: "1.75"
  FLUTTER_VERSION: "3.24.5"
  ANDROID_FLUTTER_VERSION: "3.44.4"
  BRIDGE_FLUTTER_VERSION: "3.22.3"
  FLUTTER_RUST_BRIDGE_VERSION: "1.80.1"
  CARGO_EXPAND_VERSION: "1.0.95"
  LLVM_VERSION: "15.0.6"
  NDK_VERSION: "r28c"
  CARGO_NDK_VERSION: "3.1.2"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  VERSION: "1.4.8-ice"
  RUSTDESK_BUILD_FORK: "crashbandicode/rustdesk ICE fork (UNOFFICIAL)"
  RUSTDESK_BUILD_COMMIT: ${{ github.sha }}

jobs:
  generate-bridge:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Cache generated bridge files
        id: bridge-output-cache
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ./src/bridge_generated.rs
            ./src/bridge_generated.io.rs
            ./flutter/lib/generated_bridge.dart
            ./flutter/lib/generated_bridge.freezed.dart
            ./flutter/macos/Runner/bridge_generated.h
          key: bridge-output-v1-${{ env.BRIDGE_FLUTTER_VERSION }}-${{ env.FLUTTER_RUST_BRIDGE_VERSION }}-${{ hashFiles('src/**/*.rs', 'libs/hbb_common/protos/**/*.proto', 'Cargo.lock') }}

      - name: Install prerequisites
        if: steps.bridge-output-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake curl gcc git g++ libclang-dev libgtk-3-dev \
            llvm-dev nasm ninja-build pkg-config wget ca-certificates

      - name: Install Rust toolchain
        if: steps.bridge-output-cache.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-unknown-linux-gnu
          components: "rustfmt"

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        if: steps.bridge-output-cache.outputs.cache-hit != 'true'
        with:
          prefix-key: bridge-ubuntu-22.04

      - name: Cache bridge generator binaries
        if: steps.bridge-output-cache.outputs.cache-hit != 'true'
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.cargo/bin/cargo-expand
            ~/.cargo/bin/flutter_rust_bridge_codegen
          key: bridge-tools-v1-${{ env.RUST_VERSION }}-${{ env.CARGO_EXPAND_VERSION }}-${{ env.FLUTTER_RUST_BRIDGE_VERSION }}

      - name: Cache Bridge
        if: steps.bridge-output-cache.outputs.cache-hit != 'true'
        uses: actions/cache@6f8efc29b200d32929f49075959781ed54ec270c # v3
        with:
          path: /tmp/flutter_rust_bridge
          key: bridge-${{ env.BRIDGE_FLUTTER_VERSION }}

      - name: Install flutter
        if: steps.bridge-output-cache.outputs.cache-hit != 'true'
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: "stable"
          flutter-version: ${{ env.BRIDGE_FLUTTER_VERSION }}
          cache: true

      - name: Install flutter rust bridge deps
        if: steps.bridge-output-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          command -v cargo-expand >/dev/null || cargo install cargo-expand --version ${{ env.CARGO_EXPAND_VERSION }} --locked
          command -v flutter_rust_bridge_codegen >/dev/null || cargo install flutter_rust_bridge_codegen --version ${{ env.FLUTTER_RUST_BRIDGE_VERSION }} --features "uuid" --locked
          # Newer app dependencies require a newer Dart than this bridge-only SDK.
          sed -i -e 's/extended_text: 15.0.2/extended_text: 13.0.0/g' flutter/pubspec.yaml
          sed -i -e 's/google_fonts: \^8.1.0/google_fonts: ^6.2.1/g' flutter/pubspec.yaml
          # qr_code_scanner_plus 2.2 needs Dart 3.12; bridge output does not depend on it.
          sed -i -e 's/qr_code_scanner_plus: \^2.2.0/qr_code_scanner_plus: ^2.0.14/g' flutter/pubspec.yaml
          # The bridge generator runs Flutter 3.22/Dart 3.4.
          sed -i -e 's/flutter_plugin_android_lifecycle: 2.0.35/flutter_plugin_android_lifecycle: 2.0.22/g' flutter/pubspec.yaml
          sed -i -e 's/app_links: \^7.2.0/app_links: ^6.2.0/g' flutter/pubspec.yaml
          # sqflite 2.4.x requires Dart 3.5+, while bridge Flutter 3.22 has Dart 3.4.
          sed -i -e 's/sqflite: \^2.4.3/sqflite: ^2.3.3+1/g' flutter/pubspec.yaml
          pushd flutter && flutter pub get && popd

      - name: Run flutter rust bridge
        if: steps.bridge-output-cache.outputs.cache-hit != 'true'
        run: |
          ~/.cargo/bin/flutter_rust_bridge_codegen --rust-input ./src/flutter_ffi.rs --dart-output ./flutter/lib/generated_bridge.dart --c-output ./flutter/macos/Runner/bridge_generated.h

      - name: Upload bridge artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bridge-artifact
          path: |
            ./src/bridge_generated.rs
            ./src/bridge_generated.io.rs
            ./flutter/lib/generated_bridge.dart
            ./flutter/lib/generated_bridge.freezed.dart
            ./flutter/macos/Runner/bridge_generated.h

  build-windows:
    name: build windows x86_64 (flutter)
    needs: [generate-bridge]
    runs-on: windows-2022
    steps:
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Restore bridge files
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bridge-artifact
          path: ./

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@ebc0426251bc40c7cd31162802432c68818ab8f0 # v2.0.9
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Install flutter
        uses: subosito/flutter-action@2783a3f08e1baf891508463f8c6653c258246225 # v2.12.0
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}
          architecture: x64
          cache: true

      - name: Replace engine with rustdesk custom flutter engine
        run: |
          flutter doctor -v
          flutter precache --windows
          Invoke-WebRequest -Uri https://github.com/rustdesk/engine/releases/download/main/windows-x64-release.zip -OutFile windows-x64-release.zip
          Expand-Archive -Path windows-x64-release.zip -DestinationPath windows-x64-release
          mv -Force windows-x64-release/*  C:/hostedtoolcache/windows/flutter/stable-${{ env.FLUTTER_VERSION }}-x64/bin/cache/artifacts/engine/windows-x64-release/

      - name: Patch flutter
        shell: bash
        run: |
          if [[ "3.24.5" == "${{ env.FLUTTER_VERSION }}" ]]; then
            flutter_root=$(dirname $(dirname $(which flutter)))
            patch_file="${{ github.workspace }}/.github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff"
            cd "$flutter_root"
            # flutter-action caches the SDK, including this source patch. Apply it once,
            # but accept an already-patched cache on later runs.
            if git apply --check "$patch_file"; then
              git apply "$patch_file"
            elif git apply --reverse --check "$patch_file"; then
              echo "Flutter dropdown patch is already applied"
            else
              echo "Flutter dropdown patch is neither applicable nor already applied" >&2
              exit 1
            fi
          fi

      - name: Prepare Windows Flutter dependencies
        shell: bash
        run: |
          # The custom RustDesk x64 engine is tied to Flutter 3.24/Dart 3.5.
          # Use the maintained scanner fork's compatible release for this job;
          # Android stays on 2.2.0 with Flutter 3.44/Dart 3.12.
          sed -i -e 's/qr_code_scanner_plus: \^2.2.0/qr_code_scanner_plus: ^2.0.14/g' flutter/pubspec.yaml
          sed -i -e 's/flutter_plugin_android_lifecycle: 2.0.35/flutter_plugin_android_lifecycle: 2.0.26/g' flutter/pubspec.yaml
          sed -i -e 's/app_links: \^7.2.0/app_links: ^6.4.1/g' flutter/pubspec.yaml
          sed -i -e 's/extended_text: 15.0.2/extended_text: 14.0.0/g' flutter/pubspec.yaml
          sed -i -e 's/sqflite: \^2.4.3/sqflite: ^2.4.1/g' flutter/pubspec.yaml
          sed -i -e 's/google_fonts: \^8.1.0/google_fonts: ^6.2.1/g' flutter/pubspec.yaml
          sed -i -e 's/dialogTheme: DialogThemeData(/dialogTheme: DialogTheme(/g' flutter/lib/common.dart
          sed -i -e 's/tabBarTheme: const TabBarThemeData(/tabBarTheme: const TabBarTheme(/g' flutter/lib/common.dart

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc
          components: "rustfmt"

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          prefix-key: windows-2022

      - name: Setup vcpkg with Github Actions binary cache
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2 # v11
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Cache installed Windows vcpkg dependencies
        id: windows-vcpkg-installed-cache
        uses: actions/cache/restore@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: C:\vcpkg\installed
          key: vcpkg-installed-windows-x64-static-v1-${{ env.VCPKG_COMMIT_ID }}-${{ hashFiles('vcpkg.json', 'res/vcpkg/**') }}

      - name: Install vcpkg dependencies
        if: steps.windows-vcpkg-installed-cache.outputs.cache-hit != 'true'
        env:
          VCPKG_DEFAULT_HOST_TRIPLET: x64-windows-static
        shell: bash
        run: |
          if ! $VCPKG_ROOT/vcpkg install --triplet x64-windows-static --x-install-root="$VCPKG_ROOT/installed"; then
            find "${VCPKG_ROOT}/" -name "*.log" | while read -r _1; do
              echo "$_1:"; echo "======"; cat "$_1"; echo "======"; echo "";
            done
            exit 1
          fi

      - name: Save installed Windows vcpkg dependencies
        if: steps.windows-vcpkg-installed-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: C:\vcpkg\installed
          key: vcpkg-installed-windows-x64-static-v1-${{ env.VCPKG_COMMIT_ID }}-${{ hashFiles('vcpkg.json', 'res/vcpkg/**') }}

      - name: Build rustdesk
        run: |
          # No --skip-portable-pack: run the portable packer so we also get a single
          # self-contained installer exe (rustdesk-<version>-install.exe) for releases.
          python3 .\build.py --portable --flutter --hwcodec --vram
          mv ./flutter/build/windows/x64/runner/Release ./rustdesk

      - name: Upload Windows portable folder
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rustdesk-ice-windows-x86_64
          path: rustdesk

      - name: Upload Windows installer
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rustdesk-ice-windows-installer
          # build.py names this with its own internal version (e.g. rustdesk-1.4.8-install.exe),
          # not env.VERSION, so match by glob.
          path: rustdesk-*-install.exe
          if-no-files-found: error

  build-android:
    name: build android arm64 (apk)
    needs: [generate-bridge]
    runs-on: ubuntu-24.04
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: false
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Prepare Android host toolchain
        run: |
          # ubuntu-24.04 already ships the Android host toolchain. Avoid a full
          # Linux desktop dependency install (GTK/GStreamer/Pulse/X11) in this
          # cross-compile job. Bindgen still needs the host multilib headers.
          sudo apt-get install -y --no-install-recommends gcc-multilib g++-multilib
          command -v clang
          command -v cmake
          command -v ninja
          command -v java
          command -v pkg-config

      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Cache Android Gradle and pub dependencies
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.pub-cache
          key: android-build-tools-v1-${{ env.ANDROID_FLUTTER_VERSION }}-${{ hashFiles('flutter/pubspec.yaml', 'flutter/pubspec.lock', 'flutter/android/**/*.gradle', 'flutter/android/gradle.properties', 'flutter/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            android-build-tools-v1-${{ env.ANDROID_FLUTTER_VERSION }}-

      - name: Install flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: "stable"
          flutter-version: ${{ env.ANDROID_FLUTTER_VERSION }}
          cache: true

      - name: Patch flutter
        run: |
          cd $(dirname $(dirname $(which flutter)))
          if [[ "3.24.5" == "${{ env.ANDROID_FLUTTER_VERSION }}" ]]; then
            git apply ${{ github.workspace }}/.github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff
          fi

      - uses: nttld/setup-ndk@ed92fe6cadad69be94a966a7ee3271275e62f779 # v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: true

      - name: Setup vcpkg with Github Actions binary cache
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2 # v11
        with:
          vcpkgDirectory: /opt/artifacts/vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Cache installed Android vcpkg dependencies
        id: android-vcpkg-installed-cache
        uses: actions/cache/restore@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: /opt/artifacts/vcpkg/installed
          key: vcpkg-installed-android-arm64-v1-${{ env.VCPKG_COMMIT_ID }}-${{ env.NDK_VERSION }}-${{ hashFiles('vcpkg.json', 'res/vcpkg/**') }}

      - name: Install vcpkg dependencies (android arm64)
        if: steps.android-vcpkg-installed-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          if ! ./flutter/build_android_deps.sh arm64-v8a; then
            find "${VCPKG_ROOT}/" -name "*.log" | while read -r _1; do
              echo "$_1:"; echo "======"; cat "$_1"; echo "======"; echo "";
            done
            exit 1
          fi

      - name: Save installed Android vcpkg dependencies
        if: steps.android-vcpkg-installed-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: /opt/artifacts/vcpkg/installed
          key: vcpkg-installed-android-arm64-v1-${{ env.VCPKG_COMMIT_ID }}-${{ env.NDK_VERSION }}-${{ hashFiles('vcpkg.json', 'res/vcpkg/**') }}

      - name: Restore bridge files
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bridge-artifact
          path: ./

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: "rustfmt"

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          prefix-key: rustdesk-lib-cache-android
          key: aarch64-linux-android

      - name: Build rustdesk lib
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          rustup target add aarch64-linux-android
          cargo install cargo-ndk --version ${{ env.CARGO_NDK_VERSION }} --locked
          ./flutter/ndk_arm64.sh
          mkdir -p ./flutter/android/app/src/main/jniLibs/arm64-v8a
          cp ./target/aarch64-linux-android/release/liblibrustdesk.so ./flutter/android/app/src/main/jniLibs/arm64-v8a/librustdesk.so

      - name: Set up release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # Stable signing key (from repo secrets) so a sideloaded APK installs OVER the
          # existing app and keeps all data (servers, peers, settings) instead of forcing
          # an uninstall (which wipes config) on every build. Fingerprint SHA256:
          # 9C:F8:06:C5:AD:C6:BF:23:E5:DA:63:33:AD:CD:C7:3A:B8:BA:F2:B4:E7:86:07:90:EA:E1:64:93:3A:83:16:B2
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > flutter/android/app/rustdesk-ice.p12
          cat > flutter/android/key.properties <<EOF
          storeFile=rustdesk-ice.p12
          storeType=PKCS12
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Build rustdesk apk
        shell: bash
        run: |
          export JAVA_HOME="${JAVA_HOME_17_X64}"
          export PATH="$JAVA_HOME/bin:$PATH"
          mkdir -p ./flutter/android/app/src/main/jniLibs/arm64-v8a
          cp ${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/libc++_shared.so ./flutter/android/app/src/main/jniLibs/arm64-v8a/
          cp ./target/aarch64-linux-android/release/liblibrustdesk.so ./flutter/android/app/src/main/jniLibs/arm64-v8a/librustdesk.so
          pushd flutter
          # Keep versionCode monotonic so every stable-key artifact can update the
          # previous sideload in place. The +100000 base stays above pubspec's +66.
          flutter build apk --release --target-platform android-arm64 --split-per-abi \
            --build-number "$((100000 + GITHUB_RUN_NUMBER))"
          mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk ../rustdesk-${{ env.VERSION }}-aarch64.apk
          popd

      - name: Upload Android apk
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rustdesk-ice-android-aarch64
          path: ./rustdesk-${{ env.VERSION }}-aarch64.apk
